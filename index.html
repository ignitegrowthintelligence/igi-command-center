<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IGI Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bp-dark:    #0d0f1e;
      --bp-nav:     #1a1c2e;
      --bp-teal:    #00bcd4;
      --bp-teal-lt: #e0f7fa;
      --bp-orange:  #f59e0b;
      --bp-white:   #ffffff;
      --bp-bg:      #f4f6f8;
      --bp-border:  #dde3ea;
      --bp-text:    #1f2937;
      --bp-muted:   #6b7280;
    }

    * { box-sizing: border-box; }
    body { background: var(--bp-bg); font-family: 'Inter', system-ui, sans-serif; color: var(--bp-text); margin: 0; }

    /* Header */
    .bp-header { background: var(--bp-dark); border-bottom: 2px solid var(--bp-teal); }
    .bp-logo   { color: var(--bp-teal); font-weight: 800; font-size: 1.1rem; letter-spacing: 0.05em; }
    .bp-logo span { color: #fff; }

    /* Summary cards */
    .bp-card { background: var(--bp-white); border: 1px solid var(--bp-border); border-radius: 6px; }
    .bp-card-accent { border-top: 3px solid var(--bp-teal); }

    /* Table section */
    .bp-section-header { background: var(--bp-dark); color: #fff; border-radius: 6px 6px 0 0; }
    .bp-section-title  { font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; }

    /* Tabs */
    .bp-tab-active   { background: var(--bp-teal); color: #fff; border-radius: 4px; }
    .bp-tab-inactive { color: rgba(255,255,255,0.6); border-radius: 4px; }
    .bp-tab-inactive:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* Table */
    .bp-table { width: 100%; border-collapse: collapse; background: var(--bp-white); }
    .bp-table thead th {
      background: var(--bp-teal-lt);
      color: var(--bp-text);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 12px;
      border-bottom: 2px solid var(--bp-teal);
      white-space: nowrap;
    }
    .bp-table thead th.accent { color: var(--bp-teal); }
    .bp-table tbody tr { border-bottom: 1px solid var(--bp-border); transition: background 0.1s; }
    .bp-table tbody tr:hover { background: #f8fbfc; }

    /* Row tiers */
    .row-enterprise { background: var(--bp-dark) !important; color: #fff !important; }
    .row-enterprise:hover { background: #1e2035 !important; }
    .row-enterprise td { color: #fff; font-weight: 700; }
    .row-region { background: #f0fafb !important; }
    .row-region td { font-weight: 600; color: var(--bp-text); }
    .row-market td { color: var(--bp-muted); font-size: 0.85rem; }

    /* Chevron */
    .chevron { display: inline-block; transition: transform 0.2s; font-size: 0.65rem; margin-right: 4px; color: var(--bp-teal); }
    .chevron.open { transform: rotate(90deg); }
    tr.hidden { display: none; }

    /* Badges */
    .badge-green  { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; border-radius: 4px; padding: 1px 6px; font-size: 0.72rem; font-weight: 600; }
    .badge-yellow { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; border-radius: 4px; padding: 1px 6px; font-size: 0.72rem; font-weight: 600; }
    .badge-red    { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; border-radius: 4px; padding: 1px 6px; font-size: 0.72rem; font-weight: 600; }
    .badge-gray   { background: #f3f4f6; color: #6b7280; border: 1px solid #e5e7eb; border-radius: 4px; padding: 1px 6px; font-size: 0.72rem; }

    /* Progress bar */
    .progress-bar { height: 5px; background: #e5e7eb; border-radius: 3px; overflow: hidden; margin-top: 6px; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

    /* Positive / Negative values */
    .val-pos { color: #065f46; }
    .val-neg { color: #991b1b; }
    .val-neutral { color: var(--bp-muted); }

    /* Refresh badge */
    .refresh-badge { background: rgba(0,188,212,0.15); color: var(--bp-teal); border: 1px solid rgba(0,188,212,0.3); border-radius: 999px; padding: 2px 10px; font-size: 0.72rem; }

    @media (max-width: 768px) {
      .hide-mobile { display: none; }
      .mobile-scroll { overflow-x: auto; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="bp-header px-4 md:px-8 py-3">
    <div class="max-w-screen-2xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded flex items-center justify-center font-black text-lg" style="background:var(--bp-teal);color:#fff;">I</div>
        <div>
          <div class="bp-logo">IGI <span>Command Center</span></div>
          <div style="color:rgba(255,255,255,0.45);font-size:0.7rem;letter-spacing:0.05em;">IGNITE GROWTH INTELLIGENCE</div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span id="weekBadge" style="color:rgba(255,255,255,0.5);font-size:0.75rem;"></span>
        <span id="refreshBadge" class="badge-gray">Awaiting refresh</span>
      </div>
    </div>
  </header>

  <div class="max-w-screen-2xl mx-auto px-4 md:px-8 py-5">

    <!-- Summary Cards -->
    <div id="summaryCards" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6"></div>

    <!-- Section wrapper -->
    <div style="border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);overflow:hidden;border:1px solid var(--bp-border);">

      <!-- Dark section header with tabs -->
      <div class="bp-section-header px-5 py-3 flex items-center justify-between">
        <span class="bp-section-title">Revenue Type Summary</span>
        <div class="flex items-center gap-2">
          <button onclick="switchTab('commits')"  id="tab-commits"  class="bp-tab-active   px-4 py-1.5 text-sm font-medium transition-all">Weekly Commits</button>
          <button onclick="switchTab('pipeline')" id="tab-pipeline" class="bp-tab-inactive px-4 py-1.5 text-sm font-medium transition-all">Pipeline Health</button>
        </div>
      </div>

      <!-- COMMITS PANEL -->
      <div id="panel-commits">
        <div class="mobile-scroll">
          <table class="bp-table" id="commitsTable">
            <thead>
              <tr>
                <th class="text-left" style="min-width:180px;">Market</th>
                <th class="text-right">Apr Commit</th>
                <th class="text-right">Apr Adds</th>
                <th class="text-right accent">Apr Left</th>
                <th class="text-right hide-mobile">May Commit</th>
                <th class="text-right hide-mobile">May Adds</th>
                <th class="text-right accent hide-mobile">May Left</th>
                <th class="text-right hide-mobile">Jun Commit</th>
                <th class="text-right hide-mobile">Jun Adds</th>
                <th class="text-right accent hide-mobile">Jun Left</th>
              </tr>
            </thead>
            <tbody id="commitsTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- PIPELINE PANEL -->
      <div id="panel-pipeline" class="hidden">
        <div class="mobile-scroll">
          <table class="bp-table" id="pipelineTable">
            <thead>
              <tr>
                <th class="text-left" style="min-width:180px;">Market</th>
                <th class="text-right">Plan</th>
                <th class="text-right">Pacing</th>
                <th class="text-right accent">Pacing %</th>
                <th class="text-right hide-mobile">Pipeline</th>
                <th class="text-left hide-mobile">Health</th>
              </tr>
            </thead>
            <tbody id="pipelineTbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => {
      if (n === 0 || n === null || n === undefined) return '—';
      const abs = Math.abs(n);
      const str = '$' + abs.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
      return n < 0 ? '-' + str : str;
    };
    const pct = (a, b) => b === 0 ? null : Math.round((a / b) * 100);
    const valClass = (n) => n > 0 ? 'val-pos' : n < 0 ? 'val-neg' : 'val-neutral';

    function badge(p) {
      if (p === null) return `<span class="badge-gray">—</span>`;
      if (p >= 80)    return `<span class="badge-green">${p}%</span>`;
      if (p >= 50)    return `<span class="badge-yellow">${p}%</span>`;
      return `<span class="badge-red">${p}%</span>`;
    }

    function leftCell(commit, adds, extraCls='') {
      if (commit === 0 && adds === 0) return `<td class="text-right py-2 px-3 val-neutral${extraCls}">—</td>`;
      const left = commit - adds;
      const p = commit !== 0 ? pct(adds, commit) : null;
      const cls = p !== null ? (p >= 80 ? 'val-pos' : p >= 50 ? 'badge-yellow' : 'val-neg') : valClass(-left);
      return `<td class="text-right py-2 px-3 font-semibold ${cls}${extraCls}">${fmt(left)}</td>`;
    }

    let commitsData = null, pipelineData = null;

    function sumRegion(region, month) {
      return {
        commit: region.markets.reduce((s,m) => s + (m[month]?.commit||0), 0),
        adds:   region.markets.reduce((s,m) => s + (m[month]?.adds||0),   0)
      };
    }

    function renderCommits(data) {
      const months = ['apr','may','jun'];
      const tbody = $('commitsTbody');
      tbody.innerHTML = '';

      const ent = {};
      months.forEach(mo => {
        ent[mo] = {commit:0, adds:0};
        data.regions.forEach(r => r.markets.forEach(m => {
          ent[mo].commit += m[mo]?.commit||0;
          ent[mo].adds   += m[mo]?.adds||0;
        }));
      });

      // Enterprise row
      const eRow = document.createElement('tr');
      eRow.className = 'row-enterprise cursor-pointer';
      eRow.onclick = () => toggleGroup('all', 'commits');
      eRow.innerHTML = `
        <td class="py-3 px-4">
          <span class="chevron open" id="chev-all-commits">▶</span>
          Townsquare Enterprise
        </td>
        ${months.map(mo => `
          <td class="text-right py-3 px-3">${fmt(ent[mo].commit)}</td>
          <td class="text-right py-3 px-3 ${valClass(ent[mo].adds)}">${fmt(ent[mo].adds)}</td>
          ${leftCell(ent[mo].commit, ent[mo].adds, ' py-3')}
        `).join('')}`;
      tbody.appendChild(eRow);

      data.regions.forEach(region => {
        const reg = {};
        months.forEach(mo => { reg[mo] = sumRegion(region, mo); });

        const rRow = document.createElement('tr');
        rRow.className = 'row-region cursor-pointer';
        rRow.setAttribute('data-region', region.id);
        rRow.onclick = () => toggleGroup(region.id, 'commits');
        rRow.innerHTML = `
          <td class="py-2.5 px-4 pl-8">
            <span class="chevron open" id="chev-${region.id}-commits">▶</span>
            ${region.name}
          </td>
          ${months.map(mo => `
            <td class="text-right py-2.5 px-3">${fmt(reg[mo].commit)}</td>
            <td class="text-right py-2.5 px-3 ${valClass(reg[mo].adds)}">${fmt(reg[mo].adds)}</td>
            ${leftCell(reg[mo].commit, reg[mo].adds, ' py-2.5')}
          `).join('')}`;
        tbody.appendChild(rRow);

        region.markets.forEach(market => {
          const mRow = document.createElement('tr');
          mRow.className = 'row-market';
          mRow.setAttribute('data-parent', region.id);
          mRow.innerHTML = `
            <td class="py-2 px-4 pl-14">${market.name}</td>
            ${months.map(mo => `
              <td class="text-right py-2 px-3">${fmt(market[mo]?.commit||0)}</td>
              <td class="text-right py-2 px-3 ${valClass(market[mo]?.adds||0)}">${fmt(market[mo]?.adds||0)}</td>
              ${leftCell(market[mo]?.commit||0, market[mo]?.adds||0)}
            `).join('')}`;
          tbody.appendChild(mRow);
        });
      });

      renderSummaryCards(ent);
    }

    function renderSummaryCards(ent) {
      const months = [{key:'apr',label:'April'},{key:'may',label:'May'},{key:'jun',label:'June'}];
      $('summaryCards').innerHTML = months.map(m => {
        const p = ent[m.key].commit !== 0 ? pct(ent[m.key].adds, ent[m.key].commit) : null;
        const barColor = p === null ? '#d1d5db' : p >= 80 ? '#10b981' : p >= 50 ? '#f59e0b' : '#ef4444';
        const barW = p !== null ? Math.min(Math.max(p,0),100) : 0;
        const statusCls = p === null ? 'val-neutral' : p >= 80 ? 'val-pos' : p >= 50 ? '' : 'val-neg';
        const statusStyle = p !== null && p >= 50 && p < 80 ? 'color:#92400e;' : '';
        return `
          <div class="bp-card bp-card-accent p-4">
            <div style="font-size:0.68rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--bp-muted);">${m.label} 2026</div>
            <div style="font-size:1.6rem;font-weight:800;color:var(--bp-text);line-height:1.2;margin:4px 0;">${fmt(ent[m.key].adds)}</div>
            <div style="font-size:0.75rem;color:var(--bp-muted);">of ${fmt(ent[m.key].commit)} committed</div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${barW}%;background:${barColor};"></div>
            </div>
            <div style="font-size:0.72rem;margin-top:4px;${statusStyle}" class="${statusCls}">
              ${p !== null ? p + '% delivered' : 'No commits entered'}
            </div>
          </div>`;
      }).join('');
    }

    function renderPipeline(data) {
      const tbody = $('pipelineTbody');
      tbody.innerHTML = '';
      const entP = data.regions.reduce((s,r)=>s+r.markets.reduce((ss,m)=>ss+m.plan,0),0);
      const entPc = data.regions.reduce((s,r)=>s+r.markets.reduce((ss,m)=>ss+m.pacing,0),0);
      const entPi = data.regions.reduce((s,r)=>s+r.markets.reduce((ss,m)=>ss+m.pipeline,0),0);
      const ep = pct(entPc,entP);

      const eRow = document.createElement('tr');
      eRow.className = 'row-enterprise cursor-pointer';
      eRow.onclick = () => toggleGroup('all', 'pipeline');
      eRow.innerHTML = `
        <td class="py-3 px-4"><span class="chevron open" id="chev-all-pipeline">▶</span> Townsquare Enterprise</td>
        <td class="text-right py-3 px-3">${fmt(entP)}</td>
        <td class="text-right py-3 px-3 ${valClass(entPc)}">${fmt(entPc)}</td>
        <td class="text-right py-3 px-3">${badge(ep)}</td>
        <td class="text-right py-3 px-3 hide-mobile">${fmt(entPi)}</td>
        <td class="py-3 px-3 hide-mobile">${badge(ep)}</td>`;
      tbody.appendChild(eRow);

      data.regions.forEach(region => {
        const rP = region.markets.reduce((s,m)=>s+m.plan,0);
        const rPc = region.markets.reduce((s,m)=>s+m.pacing,0);
        const rPi = region.markets.reduce((s,m)=>s+m.pipeline,0);
        const rp = pct(rPc,rP);

        const rRow = document.createElement('tr');
        rRow.className = 'row-region cursor-pointer';
        rRow.setAttribute('data-region-p', region.id);
        rRow.onclick = () => toggleGroup(region.id, 'pipeline');
        rRow.innerHTML = `
          <td class="py-2.5 px-4 pl-8"><span class="chevron open" id="chev-${region.id}-pipeline">▶</span> ${region.name}</td>
          <td class="text-right py-2.5 px-3">${fmt(rP)}</td>
          <td class="text-right py-2.5 px-3 ${valClass(rPc)}">${fmt(rPc)}</td>
          <td class="text-right py-2.5 px-3">${badge(rp)}</td>
          <td class="text-right py-2.5 px-3 hide-mobile">${fmt(rPi)}</td>
          <td class="py-2.5 px-3 hide-mobile">${badge(rp)}</td>`;
        tbody.appendChild(rRow);

        region.markets.forEach(market => {
          const mp = pct(market.pacing, market.plan);
          const mRow = document.createElement('tr');
          mRow.className = 'row-market';
          mRow.setAttribute('data-parent-p', region.id);
          mRow.innerHTML = `
            <td class="py-2 px-4 pl-14">${market.name}</td>
            <td class="text-right py-2 px-3">${fmt(market.plan)}</td>
            <td class="text-right py-2 px-3 ${valClass(market.pacing)}">${fmt(market.pacing)}</td>
            <td class="text-right py-2 px-3">${badge(mp)}</td>
            <td class="text-right py-2 px-3 hide-mobile">${fmt(market.pipeline)}</td>
            <td class="py-2 px-3 hide-mobile">${badge(mp)}</td>`;
          tbody.appendChild(mRow);
        });
      });
    }

    function toggleGroup(id, panel) {
      const isAll = id === 'all';
      const suffix = '-' + panel;
      const chevId = 'chev-' + id + suffix;
      const chev = $(chevId);
      const isOpen = chev?.classList.contains('open');

      if (isAll) {
        const pAttr = panel === 'commits' ? 'data-parent' : 'data-parent-p';
        const rAttr = panel === 'commits' ? 'data-region' : 'data-region-p';
        document.querySelectorAll(`[${pAttr}], [${rAttr}]`).forEach(r => r.classList.toggle('hidden', isOpen));
        document.querySelectorAll(`[id$="${suffix}"]`).forEach(c => { isOpen ? c.classList.remove('open') : c.classList.add('open'); });
      } else {
        const pAttr = panel === 'commits' ? 'data-parent' : 'data-parent-p';
        document.querySelectorAll(`[${pAttr}="${id}"]`).forEach(r => r.classList.toggle('hidden', isOpen));
        if (chev) chev.classList.toggle('open');
      }
    }

    function switchTab(tab) {
      $('panel-commits').classList.toggle('hidden', tab !== 'commits');
      $('panel-pipeline').classList.toggle('hidden', tab !== 'pipeline');
      $('tab-commits').className  = tab === 'commits'  ? 'bp-tab-active px-4 py-1.5 text-sm font-medium transition-all' : 'bp-tab-inactive px-4 py-1.5 text-sm font-medium transition-all';
      $('tab-pipeline').className = tab === 'pipeline' ? 'bp-tab-active px-4 py-1.5 text-sm font-medium transition-all' : 'bp-tab-inactive px-4 py-1.5 text-sm font-medium transition-all';
    }

    async function loadData() {
      const cb = '?v=' + Date.now();
      try {
        const [c, p] = await Promise.all([fetch('data/commits.json'+cb), fetch('data/pipeline.json'+cb)]);
        commitsData  = await c.json();
        pipelineData = await p.json();
        if (commitsData.weekOf) $('weekBadge').textContent = 'Week of ' + commitsData.weekOf;
        if (commitsData.lastRefreshed) {
          const d = new Date(commitsData.lastRefreshed);
          $('refreshBadge').className = 'refresh-badge';
          $('refreshBadge').textContent = 'Refreshed ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' at ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        }
        renderCommits(commitsData);
        renderPipeline(pipelineData);
      } catch(e) { console.error(e); }
    }

    loadData();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IGI Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0f1e; font-family: 'Inter', system-ui, sans-serif; }
    .glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(8px); }
    .tab-active { background: #2563eb; color: #fff; }
    .tab-inactive { background: transparent; color: #94a3b8; }
    .row-enterprise { background: rgba(37,99,235,0.15); }
    .row-region { background: rgba(255,255,255,0.04); }
    .row-market { background: transparent; }
    .row-market:hover { background: rgba(255,255,255,0.03); }
    .badge-green  { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .badge-yellow { background: rgba(234,179,8,0.15);  color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
    .badge-red    { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .badge-gray   { background: rgba(148,163,184,0.1); color: #94a3b8; border: 1px solid rgba(148,163,184,0.2); }
    .chevron { transition: transform 0.2s ease; display: inline-block; }
    .chevron.open { transform: rotate(90deg); }
    .progress-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    tr.hidden { display: none; }
    @media (max-width: 768px) {
      .hide-mobile { display: none; }
      .mobile-scroll { overflow-x: auto; }
    }
  </style>
</head>
<body class="min-h-screen text-white">

  <!-- Header -->
  <header class="border-b border-white/10 px-4 md:px-8 py-4">
    <div class="max-w-screen-2xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-sm font-bold">IGI</div>
        <div>
          <div class="text-white font-semibold text-sm md:text-base">IGI Command Center</div>
          <div class="text-slate-500 text-xs">Ignite Growth Intelligence</div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div id="weekBadge" class="text-xs text-slate-400 hide-mobile"></div>
        <div id="refreshBadge" class="text-xs px-2 py-1 rounded-full badge-gray">Awaiting refresh</div>
      </div>
    </div>
  </header>

  <!-- Summary Cards -->
  <div class="max-w-screen-2xl mx-auto px-4 md:px-8 py-6">
    <div id="summaryCards" class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6"></div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-6">
      <button onclick="switchTab('commits')" id="tab-commits" class="tab-active px-4 py-2 rounded-lg text-sm font-medium transition-all">Weekly Commits</button>
      <button onclick="switchTab('pipeline')" id="tab-pipeline" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition-all">Pipeline Health</button>
    </div>

    <!-- COMMITS TAB -->
    <div id="panel-commits">
      <div class="mobile-scroll">
        <table class="w-full text-sm border-collapse" id="commitsTable">
          <thead>
            <tr class="text-slate-400 text-xs uppercase tracking-wide border-b border-white/10">
              <th class="text-left py-3 px-3 w-52">Market</th>
              <th class="text-right py-3 px-2">Apr Commit</th>
              <th class="text-right py-3 px-2">Apr Adds</th>
              <th class="text-right py-3 px-2">Apr Left</th>
              <th class="text-right py-3 px-2 hide-mobile">May Commit</th>
              <th class="text-right py-3 px-2 hide-mobile">May Adds</th>
              <th class="text-right py-3 px-2 hide-mobile">May Left</th>
              <th class="text-right py-3 px-2 hide-mobile">Jun Commit</th>
              <th class="text-right py-3 px-2 hide-mobile">Jun Adds</th>
              <th class="text-right py-3 px-2 hide-mobile">Jun Left</th>
            </tr>
          </thead>
          <tbody id="commitsTbody"></tbody>
        </table>
      </div>
    </div>

    <!-- PIPELINE TAB -->
    <div id="panel-pipeline" class="hidden">
      <div class="mobile-scroll">
        <table class="w-full text-sm border-collapse" id="pipelineTable">
          <thead>
            <tr class="text-slate-400 text-xs uppercase tracking-wide border-b border-white/10">
              <th class="text-left py-3 px-3 w-52">Market</th>
              <th class="text-right py-3 px-2">Plan</th>
              <th class="text-right py-3 px-2">Pacing</th>
              <th class="text-right py-3 px-2">Pacing %</th>
              <th class="text-right py-3 px-2 hide-mobile">Pipeline</th>
              <th class="text-left py-3 px-3 hide-mobile">Health</th>
            </tr>
          </thead>
          <tbody id="pipelineTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => n === 0 ? '—' : '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
    const pct = (a, b) => b === 0 ? null : Math.round((a / b) * 100);

    function healthBadge(p) {
      if (p === null) return `<span class="badge-gray px-2 py-0.5 rounded text-xs">—</span>`;
      if (p >= 80)    return `<span class="badge-green px-2 py-0.5 rounded text-xs">${p}%</span>`;
      if (p >= 60)    return `<span class="badge-yellow px-2 py-0.5 rounded text-xs">${p}%</span>`;
      return `<span class="badge-red px-2 py-0.5 rounded text-xs">${p}%</span>`;
    }

    function leftCell(commit, adds) {
      if (commit === 0) return `<td class="text-right py-2 px-2 text-slate-600">—</td>`;
      const left = commit - adds;
      const p = pct(adds, commit);
      const cls = p >= 80 ? 'text-green-400' : p >= 50 ? 'text-yellow-400' : 'text-red-400';
      return `<td class="text-right py-2 px-2 ${cls} font-medium">${fmt(left)}</td>`;
    }

    let commitsData = null;
    let pipelineData = null;

    function sumRegionCommits(region, month) {
      return { commit: region.markets.reduce((s,m) => s + m[month].commit, 0), adds: region.markets.reduce((s,m) => s + m[month].adds, 0) };
    }

    function renderCommits(data) {
      const months = ['apr','may','jun'];
      const tbody = $('commitsTbody');
      tbody.innerHTML = '';

      // Compute enterprise totals
      const ent = {};
      months.forEach(mo => {
        ent[mo] = { commit: 0, adds: 0 };
        data.regions.forEach(r => r.markets.forEach(m => { ent[mo].commit += m[mo].commit; ent[mo].adds += m[mo].adds; }));
      });

      // Enterprise row
      const entRow = document.createElement('tr');
      entRow.className = 'row-enterprise cursor-pointer border-b border-white/10';
      entRow.setAttribute('data-type','enterprise');
      entRow.onclick = () => toggleGroup('all', entRow);
      entRow.innerHTML = `
        <td class="py-3 px-3 font-bold text-white">
          <span class="chevron open" id="chev-all">▶</span>
          <span class="ml-2">Townsquare Enterprise</span>
        </td>
        ${months.map(mo => `
          <td class="text-right py-3 px-2 text-slate-300">${fmt(ent[mo].commit)}</td>
          <td class="text-right py-3 px-2 text-blue-400">${fmt(ent[mo].adds)}</td>
          ${leftCell(ent[mo].commit, ent[mo].adds).replace('<td','<td').replace('py-2','py-3')}
        `).join('')}`;
      tbody.appendChild(entRow);

      // Regions & markets
      data.regions.forEach(region => {
        const reg = {};
        months.forEach(mo => { reg[mo] = sumRegionCommits(region, mo); });

        const regRow = document.createElement('tr');
        regRow.className = 'row-region cursor-pointer border-b border-white/5';
        regRow.setAttribute('data-group', region.id);
        regRow.setAttribute('data-type','region');
        regRow.onclick = () => toggleGroup(region.id, regRow);
        regRow.innerHTML = `
          <td class="py-2.5 px-3 pl-7 font-semibold text-slate-200">
            <span class="chevron open" id="chev-${region.id}">▶</span>
            <span class="ml-2">${region.name}</span>
          </td>
          ${months.map(mo => `
            <td class="text-right py-2.5 px-2 text-slate-300">${fmt(reg[mo].commit)}</td>
            <td class="text-right py-2.5 px-2 text-blue-400">${fmt(reg[mo].adds)}</td>
            ${leftCell(reg[mo].commit, reg[mo].adds).replace('py-2','py-2.5')}
          `).join('')}`;
        tbody.appendChild(regRow);

        region.markets.forEach(market => {
          const mRow = document.createElement('tr');
          mRow.className = 'row-market border-b border-white/5';
          mRow.setAttribute('data-parent', region.id);
          mRow.innerHTML = `
            <td class="py-2 px-3 pl-12 text-slate-400">${market.name}</td>
            ${months.map(mo => `
              <td class="text-right py-2 px-2 text-slate-400">${fmt(market[mo].commit)}</td>
              <td class="text-right py-2 px-2 text-slate-300">${fmt(market[mo].adds)}</td>
              ${leftCell(market[mo].commit, market[mo].adds)}
            `).join('')}`;
          tbody.appendChild(mRow);
        });
      });

      renderSummaryCards(data, ent);
    }

    function renderSummaryCards(data, ent) {
      const months = [{key:'apr',label:'April'},{key:'may',label:'May'},{key:'jun',label:'June'}];
      const container = $('summaryCards');
      container.innerHTML = months.map(m => {
        const p = pct(ent[m.key].adds, ent[m.key].commit);
        const barColor = p >= 80 ? 'bg-green-500' : p >= 50 ? 'bg-yellow-500' : 'bg-red-500';
        const barWidth = p ? Math.min(p, 100) : 0;
        return `
          <div class="glass rounded-xl p-4">
            <div class="text-xs text-slate-500 uppercase tracking-wide mb-1">${m.label}</div>
            <div class="text-xl font-bold text-white">${fmt(ent[m.key].adds)}</div>
            <div class="text-xs text-slate-400 mb-2">of ${fmt(ent[m.key].commit)} committed</div>
            <div class="progress-bar">
              <div class="progress-fill ${barColor}" style="width:${barWidth}%"></div>
            </div>
            <div class="text-xs mt-1 ${p >= 80 ? 'text-green-400' : p >= 50 ? 'text-yellow-400' : 'text-slate-500'}">${p !== null ? p+'% delivered' : 'No commits'}</div>
          </div>`;
      }).join('');
    }

    function renderPipeline(data) {
      const tbody = $('pipelineTbody');
      tbody.innerHTML = '';

      // Enterprise totals
      const entPlan = data.regions.reduce((s,r) => s + r.markets.reduce((ss,m) => ss+m.plan,0),0);
      const entPacing = data.regions.reduce((s,r) => s + r.markets.reduce((ss,m) => ss+m.pacing,0),0);
      const entPipeline = data.regions.reduce((s,r) => s + r.markets.reduce((ss,m) => ss+m.pipeline,0),0);
      const entP = pct(entPacing, entPlan);

      const entRow = document.createElement('tr');
      entRow.className = 'row-enterprise cursor-pointer border-b border-white/10';
      entRow.onclick = () => toggleGroup('all-p', entRow);
      entRow.innerHTML = `
        <td class="py-3 px-3 font-bold text-white">
          <span class="chevron open" id="chev-all-p">▶</span>
          <span class="ml-2">Townsquare Enterprise</span>
        </td>
        <td class="text-right py-3 px-2 text-slate-300">${fmt(entPlan)}</td>
        <td class="text-right py-3 px-2 text-blue-400">${fmt(entPacing)}</td>
        <td class="text-right py-3 px-2">${healthBadge(entP)}</td>
        <td class="text-right py-3 px-2 text-slate-300 hide-mobile">${fmt(entPipeline)}</td>
        <td class="py-3 px-3 hide-mobile">${healthBadge(entP)}</td>`;
      tbody.appendChild(entRow);

      data.regions.forEach(region => {
        const rPlan = region.markets.reduce((s,m) => s+m.plan,0);
        const rPacing = region.markets.reduce((s,m) => s+m.pacing,0);
        const rPipeline = region.markets.reduce((s,m) => s+m.pipeline,0);
        const rP = pct(rPacing, rPlan);

        const regRow = document.createElement('tr');
        regRow.className = 'row-region cursor-pointer border-b border-white/5';
        regRow.setAttribute('data-group-p', region.id);
        regRow.onclick = () => toggleGroup(region.id+'-p', regRow);
        regRow.innerHTML = `
          <td class="py-2.5 px-3 pl-7 font-semibold text-slate-200">
            <span class="chevron open" id="chev-${region.id}-p">▶</span>
            <span class="ml-2">${region.name}</span>
          </td>
          <td class="text-right py-2.5 px-2 text-slate-300">${fmt(rPlan)}</td>
          <td class="text-right py-2.5 px-2 text-blue-400">${fmt(rPacing)}</td>
          <td class="text-right py-2.5 px-2">${healthBadge(rP)}</td>
          <td class="text-right py-2.5 px-2 text-slate-300 hide-mobile">${fmt(rPipeline)}</td>
          <td class="py-2.5 px-3 hide-mobile">${healthBadge(rP)}</td>`;
        tbody.appendChild(regRow);

        region.markets.forEach(market => {
          const p = pct(market.pacing, market.plan);
          const mRow = document.createElement('tr');
          mRow.className = 'row-market border-b border-white/5';
          mRow.setAttribute('data-parent-p', region.id);
          mRow.innerHTML = `
            <td class="py-2 px-3 pl-12 text-slate-400">${market.name}</td>
            <td class="text-right py-2 px-2 text-slate-400">${fmt(market.plan)}</td>
            <td class="text-right py-2 px-2 text-slate-300">${fmt(market.pacing)}</td>
            <td class="text-right py-2 px-2">${healthBadge(p)}</td>
            <td class="text-right py-2 px-2 text-slate-400 hide-mobile">${fmt(market.pipeline)}</td>
            <td class="py-2 px-3 hide-mobile">${healthBadge(p)}</td>`;
          tbody.appendChild(mRow);
        });
      });
    }

    function toggleGroup(id, clickedRow) {
      const isCommits = id.endsWith('-p') ? false : true;
      const isAll = id === 'all' || id === 'all-p';
      const chevId = 'chev-' + id;
      const chev = $(chevId);

      if (isAll) {
        const attr = isCommits ? 'data-parent' : 'data-parent-p';
        const rows = document.querySelectorAll(`[${attr}]`);
        const regionAttr = isCommits ? 'data-group' : 'data-group-p';
        const regionRows = document.querySelectorAll(`[${regionAttr}]`);
        const isOpen = chev && chev.classList.contains('open');
        rows.forEach(r => r.classList.toggle('hidden', isOpen));
        regionRows.forEach(r => r.classList.toggle('hidden', isOpen));
        if (chev) chev.classList.toggle('open');
        // Update region chevrons
        document.querySelectorAll('[id^="chev-"]').forEach(c => {
          if (c.id !== chevId) { if (isOpen) c.classList.remove('open'); else c.classList.add('open'); }
        });
      } else {
        const suffix = isCommits ? '' : '-p';
        const parentAttr = isCommits ? 'data-parent' : 'data-parent-p';
        const regionId = isCommits ? id : id.replace('-p','');
        const rows = document.querySelectorAll(`[${parentAttr}="${regionId}"]`);
        const isOpen = chev && chev.classList.contains('open');
        rows.forEach(r => r.classList.toggle('hidden', isOpen));
        if (chev) chev.classList.toggle('open');
      }
    }

    function switchTab(tab) {
      $('panel-commits').classList.toggle('hidden', tab !== 'commits');
      $('panel-pipeline').classList.toggle('hidden', tab !== 'pipeline');
      $('tab-commits').className = tab === 'commits' ? 'tab-active px-4 py-2 rounded-lg text-sm font-medium transition-all' : 'tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition-all';
      $('tab-pipeline').className = tab === 'pipeline' ? 'tab-active px-4 py-2 rounded-lg text-sm font-medium transition-all' : 'tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition-all';
    }

    async function loadData() {
      const cb = '?v=' + Date.now();
      try {
        const [c, p] = await Promise.all([fetch('data/commits.json'+cb), fetch('data/pipeline.json'+cb)]);
        commitsData = await c.json();
        pipelineData = await p.json();

        if (commitsData.weekOf) $('weekBadge').textContent = 'Week of ' + commitsData.weekOf;
        if (commitsData.lastRefreshed) {
          const d = new Date(commitsData.lastRefreshed);
          $('refreshBadge').textContent = 'Refreshed ' + d.toLocaleDateString('en-US', {month:'short',day:'numeric'}) + ' at ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
          $('refreshBadge').className = 'text-xs px-2 py-1 rounded-full badge-green';
        }

        renderCommits(commitsData);
        renderPipeline(pipelineData);
      } catch(e) {
        console.error('Failed to load data', e);
      }
    }

    loadData();
  </script>
</body>
</html>
